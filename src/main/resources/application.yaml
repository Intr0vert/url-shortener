spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:postgresql://localhost:5432/shortener
    username: shortener
    password: ${DB_PASSWORD:shortener}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
